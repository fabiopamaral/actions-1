name: First workflow
on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Welcome message
          run: echo "Welcome to the GitHub Actions" 
        
        - name: List files
          run: ls -la
          
        - name: Read file
          run: cat README.md